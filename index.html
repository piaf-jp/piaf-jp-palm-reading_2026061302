<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNCHRONICITY - タロット占い</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F4QSWECQ9F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  
    gtag('config', 'G-F4QSWECQ9F');
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 大アルカナ (22枚) ---
    const MAJOR_ARCANA = [
      { id: 'M0', name: "愚者 (The Fool)", img: "https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg", type: 'major' },
      { id: 'M1', name: "魔術師 (The Magician)", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg", type: 'major' },
      { id: 'M2', name: "女教皇 (The High Priestess)", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg", type: 'major' },
      { id: 'M3', name: "女帝 (The Empress)", img: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg", type: 'major' },
      { id: 'M4', name: "皇帝 (The Emperor)", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg", type: 'major' },
      { id: 'M5', name: "教皇 (The Hierophant)", img: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg", type: 'major' },
      { id: 'M6', name: "恋人 (The Lovers)", img: "https://upload.wikimedia.org/wikipedia/commons/3/3a/TheLovers.jpg", type: 'major' },
      { id: 'M7', name: "戦車 (The Chariot)", img: "https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg", type: 'major' },
      { id: 'M8', name: "力 (Strength)", img: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg", type: 'major' },
      { id: 'M9', name: "隠者 (The Hermit)", img: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg", type: 'major' },
      { id: 'M10', name: "運命の輪 (Wheel of Fortune)", img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", type: 'major' },
      { id: 'M11', name: "正義 (Justice)", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg", type: 'major' },
      { id: 'M12', name: "吊るされた男 (The Hanged Man)", img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg", type: 'major' },
      { id: 'M13', name: "死神 (Death)", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg", type: 'major' },
      { id: 'M14', name: "節制 (Temperance)", img: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg", type: 'major' },
      { id: 'M15', name: "悪魔 (The Devil)", img: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg", type: 'major' },
      { id: 'M16', name: "塔 (The Tower)", img: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg", type: 'major' },
      { id: 'M17', name: "星 (The Star)", img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg", type: 'major' },
      { id: 'M18', name: "月 (The Moon)", img: "https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg", type: 'major' },
      { id: 'M19', name: "太陽 (The Sun)", img: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg", type: 'major' },
      { id: 'M20', name: "審判 (Judgement)", img: "https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgment.jpg", type: 'major' },
      { id: 'M21', name: "世界 (The World)", img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg", type: 'major' }
    ];

    // --- 小アルカナ (56枚) ---
    const generateMinorArcana = () => {
      const suits = [
        { id: 'W', name: 'ワンド (Wands)', color: 'bg-red-800' },
        { id: 'C', name: 'カップ (Cups)', color: 'bg-blue-800' },
        { id: 'S', name: 'ソード (Swords)', color: 'bg-slate-700' },
        { id: 'P', name: 'ペンタクル (Pentacles)', color: 'bg-emerald-800' }
      ];
      const ranks = ['Ace', '2', '3', '4', '5', '6', '7', '8', '9', '10', 'Page', 'Knight', 'Queen', 'King'];
      
      let minorCards = [];
      suits.forEach(suit => {
        ranks.forEach(rank => {
          minorCards.push({
            id: `${suit.id}${rank}`,
            name: `${suit.name}の${rank}`,
            img: null, 
            color: suit.color,
            type: 'minor',
            suit: suit.name,
            rank: rank,
            // 小アルカナ解説サイトへのリンクに統一
            galleryLink: `https://sup.andyou.jp/tarot/minor-arcana/`
          });
        });
      });
      return minorCards;
    };

    const MINOR_ARCANA = generateMinorArcana();
    const FULL_DECK = [...MAJOR_ARCANA, ...MINOR_ARCANA];

    const SPREAD_POSITIONS = {
      1: ["総合的な結論・メッセージ"],
      3: ["過去 (原因・背景)", "現在 (現状・課題)", "未来 (結果・可能性)"],
      5: ["現在の状況", "選択肢Aの近い未来", "選択肢Aの最終結果", "選択肢Bの近い未来", "選択肢Bの最終結果"],
      7: ["過去", "現在", "未来", "周囲の状況", "無意識・本心", "対応策・アドバイス", "最終結果"],
      10: ["現在の状況", "障害・キーカード", "顕在意識", "潜在意識", "過去", "近い未来", "あなたの立場", "周囲の環境", "希望/恐れ", "最終結果"],
      13: ["1月(自己)", "2月(金運)", "3月(知性)", "4月(家庭)", "5月(恋愛)", "6月(労働)", "7月(対人)", "8月(共有)", "9月(精神)", "10月(社会的目標)", "11月(友人)", "12月(清算)", "年間総合"]
    };

    const fetchTarotReading = async (question, drawnCards, spreadType, deckType, apiKey, model) => {
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      
      const cardsText = drawnCards.map((card, index) => {
        const position = SPREAD_POSITIONS[spreadType][index] || `ポジション${index + 1}`;
        const orientation = card.isReversed ? "逆位置" : "正位置";
        return `・${position}: ${card.name} (${orientation})`;
      }).join("\n");

      let userQ = question || "特になし。今の私に必要なメッセージをください。";

      const promptText = `
あなたは世界的に有名なプロのタロット占い師です。
今回使用したデッキは「${deckType === 'major' ? '大アルカナのみ(22枚)' : 'フルデッキ(78枚)'}」です。
ユーザーの悩みに対して、引かれたカードに基づく深いリーディングを行ってください。

【ユーザーの悩み】
${userQ}

【引かれたカードと配置（スプレッド形式: ${spreadType}枚引き）】
${cardsText}

指示：必ず指定されたJSONスキーマに従い、具体的で希望の持てるアドバイスを出力してください。
`;

      const responseSchema = {
        type: "OBJECT",
        properties: {
          title: { type: "STRING", description: "リーディング全体を象徴する見出し（20文字以内）" },
          cardReadings: {
            type: "ARRAY",
            items: {
              type: "OBJECT",
              properties: {
                cardName: { type: "STRING" },
                position: { type: "STRING" },
                reading: { type: "STRING", description: "カードの意味と悩みへの解釈" }
              },
              required: ["cardName", "position", "reading"]
            }
          },
          comprehensiveResult: { type: "STRING", description: "総合分析（400文字程度）" },
          adviceResult: { type: "STRING", description: "具体的な指針（300文字程度）" }
        },
        required: ["title", "cardReadings", "comprehensiveResult", "adviceResult"]
      };

      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: promptText }] }],
          generationConfig: { temperature: 0.7, response_mime_type: "application/json", response_schema: responseSchema }
        })
      });

      if (!response.ok) throw new Error(`APIエラー: ${response.status}`);
      const data = await response.json();
      return JSON.parse(data.candidates[0].content.parts[0].text);
    };

    // --- 入力・設定画面 ---
    const InputStage = ({ onStart }) => {
      const [question, setQuestion] = useState('');
      const [spread, setSpread] = useState(3);
      const [deckType, setDeckType] = useState('major');
      const [apiKey, setApiKey] = useState(localStorage.getItem('sync_tarot_api_key') || '');
      const [model, setModel] = useState(localStorage.getItem('sync_tarot_model') || 'gemini-3.5-flash');
      const [showSettings, setShowSettings] = useState(!apiKey);
      const [showAdvancedSpreads, setShowAdvancedSpreads] = useState(false);

      const handleStart = () => {
        if (!apiKey) { alert('Gemini APIキーを設定してください。'); return; }
        localStorage.setItem('sync_tarot_api_key', apiKey);
        localStorage.setItem('sync_tarot_model', model);
        onStart({ question, spread, deckType, apiKey, model });
      };

      return (
        <div className="max-w-2xl mx-auto space-y-6 animate-fade-in pt-4 pb-12">
          {/* 【タイトル追加】アプリの目的を明確化 */}
          <div className="text-center mb-8">
            <h1 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 drop-shadow-sm">SYNCHRONICITY</h1>
            <p className="text-sm font-bold text-slate-500 mt-2">本格タロット占いアプリ</p>
          </div>

          <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <h2 className="text-lg font-bold text-indigo-600 mb-4 border-b border-slate-100 pb-2">デッキ（使用するカード）の選択</h2>
            <div className="flex flex-col md:flex-row gap-4">
              <div onClick={() => setDeckType('major')} className={`flex-1 p-4 rounded-xl cursor-pointer border-2 transition-all ${deckType === 'major' ? 'bg-indigo-50 border-indigo-400 shadow-sm' : 'bg-white border-slate-200 hover:border-slate-300'}`}>
                <div className={`font-bold mb-1 ${deckType === 'major' ? 'text-indigo-700' : 'text-slate-700'}`}>大アルカナのみ (22枚)</div>
                <div className="text-xs text-slate-500">物事の核心や大きな運命の流れ、シンプルな結果を知りたい時に。</div>
              </div>
              <div onClick={() => setDeckType('full')} className={`flex-1 p-4 rounded-xl cursor-pointer border-2 transition-all ${deckType === 'full' ? 'bg-indigo-50 border-indigo-400 shadow-sm' : 'bg-white border-slate-200 hover:border-slate-300'}`}>
                <div className={`font-bold mb-1 ${deckType === 'full' ? 'text-indigo-700' : 'text-slate-700'}`}>フルデッキ (78枚)</div>
                <div className="text-xs text-slate-500">日常の詳細な変化、人の細やかな感情、具体的な時期を深く読み解く時に。</div>
              </div>
            </div>
          </div>

          <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <h2 className="text-lg font-bold text-indigo-600 mb-4 border-b border-slate-100 pb-2">あなたの心の中を教えてください</h2>
            <textarea value={question} onChange={(e) => setQuestion(e.target.value)} placeholder="悩み、知りたいこと、あるいはただ「今のメッセージ」と入力しても構いません。" className="w-full bg-slate-50 border border-slate-200 rounded-lg p-4 text-slate-800 h-32 focus:outline-none focus:border-indigo-400 resize-none" />
          </div>

          <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <h2 className="text-lg font-bold text-indigo-600 mb-4 border-b border-slate-100 pb-2">スプレッド（展開法）の選択</h2>
            <div className="flex gap-4 mb-4">
              {[ { value: 1, label: "ワンオラクル", desc: "1枚引き・今日の結論に" }, { value: 3, label: "スリーカード", desc: "3枚引き・過去/現在/未来の流れに" }].map(opt => (
                <div key={opt.value} onClick={() => setSpread(opt.value)} className={`flex-1 p-4 rounded-xl cursor-pointer border-2 transition-all ${spread === opt.value ? 'bg-indigo-50 border-indigo-400 shadow-sm' : 'bg-white border-slate-200 hover:border-slate-300'}`}>
                  <div className={`font-bold mb-1 ${spread === opt.value ? 'text-indigo-700' : 'text-slate-700'}`}>{opt.label}</div>
                  <div className="text-xs text-slate-500">{opt.desc}</div>
                </div>
              ))}
            </div>

            <div className="border border-slate-200 rounded-xl overflow-hidden mt-4">
              <button className="w-full p-4 bg-slate-50 flex justify-between items-center text-sm font-bold text-slate-600 hover:bg-indigo-50 transition-colors" onClick={() => setShowAdvancedSpreads(!showAdvancedSpreads)}>
                <span>✨ 人生で迷った時の特別なスプレッドを開く</span><span>{showAdvancedSpreads ? '▲' : '▼'}</span>
              </button>
              {showAdvancedSpreads && (
                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-3 bg-white">
                  {[ { value: 5, label: "二者択一 (5枚)", desc: "AかBか、迷う2つの選択肢がある時に" }, { value: 7, label: "ヘキサグラム (7枚)", desc: "問題の背景と解決策を多角的に分析" }, { value: 10, label: "ケルト十字 (10枚)", desc: "問題の深層から最終結果まで徹底解剖" }, { value: 13, label: "ホロスコープ (13枚)", desc: "1年間の運勢や人生のテーマを俯瞰" } ].map(opt => (
                    <div key={opt.value} onClick={() => setSpread(opt.value)} className={`p-3 rounded-lg cursor-pointer border-2 transition-all ${spread === opt.value ? 'bg-purple-50 border-purple-400 shadow-sm' : 'bg-white border-slate-200 hover:border-slate-300'}`}>
                      <div className={`font-bold text-sm mb-1 ${spread === opt.value ? 'text-purple-700' : 'text-slate-700'}`}>{opt.label}</div>
                      <div className="text-[10px] text-slate-500 leading-tight">{opt.desc}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div className="p-4 bg-slate-50 cursor-pointer flex justify-between items-center hover:bg-slate-100" onClick={() => setShowSettings(!showSettings)}>
              <span className="font-bold text-slate-600">システム設定 (API)</span><span className="text-slate-400 text-xl">{showSettings ? '−' : '＋'}</span>
            </div>
            {showSettings && (
              <div className="p-6 bg-white border-t border-slate-100 space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">Gemini API Key</label>
                  <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-800 focus:outline-none focus:border-indigo-400" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">Model</label>
                  <select value={model} onChange={(e) => setModel(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-800 focus:outline-none focus:border-indigo-400">
                    <option value="gemini-3.5-flash">gemini-3.5-flash (推奨・最新)</option>
                    <option value="gemini-3.1-Pro">gemini-3.1-Pro (超高精度)</option>
                    <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite (軽量・高速)</option>
                  </select>
                </div>
              </div>
            )}
          </div>
          <button onClick={handleStart} className="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5">運命の糸を紡ぐ</button>
        </div>
      );
    };

    // --- シャッフル画面 ---
    const ShuffleStage = ({ spread, deckType, onComplete }) => {
      const displayCardCount = Math.min(deckType === 'major' ? 22 : 30, 30);
      const [cardsOnTable, setCardsOnTable] = useState(Array(displayCardCount).fill(null));
      const [drawnCards, setDrawnCards] = useState([]);
      const [availableDeck, setAvailableDeck] = useState(deckType === 'major' ? [...MAJOR_ARCANA] : [...FULL_DECK]);

      const handleCardClick = (index) => {
        if (cardsOnTable[index] !== null || drawnCards.length >= spread) return;
        const randomIndex = Math.floor(Math.random() * availableDeck.length);
        const selectedCard = availableDeck[randomIndex];
        const isReversed = Math.random() < 0.5;
        const newDrawnCard = { ...selectedCard, isReversed };
        const newDeck = [...availableDeck];
        newDeck.splice(randomIndex, 1);
        setAvailableDeck(newDeck);
        const newTable = [...cardsOnTable];
        newTable[index] = newDrawnCard;
        setCardsOnTable(newTable);
        const newDrawnCards = [...drawnCards, newDrawnCard];
        setDrawnCards(newDrawnCards);
        if (newDrawnCards.length === spread) setTimeout(() => onComplete(newDrawnCards), 1500);
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-[80vh] pt-8 animate-fade-in">
          <h2 className="text-2xl font-bold text-indigo-600 mb-2">直感でカードを引いてください</h2>
          <p className="text-slate-500 font-medium mb-8 bg-white px-4 py-1 rounded-full shadow-sm border border-slate-200">あと {spread - drawnCards.length} 枚</p>
          <div className="flex gap-2 md:gap-3 flex-wrap justify-center max-w-5xl px-4">
            {cardsOnTable.map((card, index) => (
              <div key={index} onClick={() => handleCardClick(index)} className="w-16 h-24 md:w-20 md:h-32 cursor-pointer perspective-[1000px] hover:-translate-y-2 transition-transform">
                <div className={`relative w-full h-full transition-transform duration-700 [transform-style:preserve-3d] ${card !== null ? '[transform:rotateY(180deg)]' : ''}`}>
                  <div className="absolute inset-0 bg-slate-800 border-[3px] border-slate-400 rounded-md shadow-md [backface-visibility:hidden] flex items-center justify-center">
                    <span className="text-slate-500 text-opacity-50 text-xl">✺</span>
                  </div>
                  <div className="absolute inset-0 bg-white border-2 border-indigo-200 rounded-md overflow-hidden [backface-visibility:hidden] [transform:rotateY(180deg)] shadow-[0_0_15px_rgba(99,102,241,0.4)]">
                    {card && (
                      <div className={`w-full h-full flex flex-col relative ${card.isReversed ? 'rotate-180' : ''}`}>
                        {card.img ? (
                          <img src={card.img} alt={card.name} className="w-full h-full object-cover" />
                        ) : (
                          <div className={`w-full h-full flex flex-col items-center justify-center text-white ${card.color} p-1 text-center`}>
                            <span className="text-[10px] font-bold opacity-80">{card.suit}</span>
                            <span className="text-xl font-black mt-1">{card.rank}</span>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // --- ローディング画面 ---
    const LoadingStage = ({ config, drawnCards, onResult, onError }) => {
      useEffect(() => {
        let isMounted = true;
        fetchTarotReading(config.question, drawnCards, config.spread, config.deckType, config.apiKey, config.model)
          .then(res => { if (isMounted) onResult(res); })
          .catch(err => { if (isMounted) onError(err.message); });
        return () => { isMounted = false; };
      }, []);
      return (
        <div className="flex flex-col items-center justify-center min-h-[70vh]">
          <div className="relative w-32 h-32 flex items-center justify-center mb-8">
            <div className="absolute inset-0 border-t-4 border-indigo-500 rounded-full animate-spin"></div>
            <div className="absolute inset-2 border-r-4 border-purple-400 rounded-full animate-spin direction-reverse" style={{animationDirection: 'reverse'}}></div>
            <span className="text-3xl drop-shadow-md">🔮</span>
          </div>
          <h2 className="text-xl text-indigo-600 font-bold animate-pulse tracking-widest">運命を読み解いています...</h2>
        </div>
      );
    };

    // --- 結果画面 ---
    const ResultStage = ({ reading, drawnCards, config, onReset, saveToHistory }) => {
      useEffect(() => {
        saveToHistory({ date: new Date().toLocaleString(), reading, drawnCards, spreadType: config.spread, deckType: config.deckType });
      }, []);

      const downloadTextFile = () => {
        const textContent = `🔮 SYNCHRONICITY - タロット鑑定結果 🔮\n\n` +
          `【テーマ】: ${reading.title}\n` +
          `【日時】: ${new Date().toLocaleString()}\n` +
          `【デッキ】: ${config.deckType === 'major' ? '大アルカナのみ' : 'フルデッキ'}\n\n` +
          `=== 引いたカード ===\n` +
          drawnCards.map((c, i) => `・${SPREAD_POSITIONS[config.spread][i]}: ${c.name} (${c.isReversed ? '逆位置' : '正位置'})`).join('\n') + `\n\n` +
          `=== カードのささやき ===\n` +
          reading.cardReadings.map(cr => `[${cr.position}] ${cr.cardName}\n${cr.reading}`).join('\n\n') + `\n\n` +
          `=== 総合リーディング ===\n${reading.comprehensiveResult}\n\n` +
          `=== 導きとアクション ===\n${reading.adviceResult}\n\n` +
          `-----------------------------------\nOracle of Tarot - SYNCHRONICITY`;

        const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Tarot_Reading_${new Date().getTime()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      return (
        <div className="max-w-5xl mx-auto py-8 animate-fade-in space-y-8">
          <div className="text-center mb-10">
            <h1 className="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-4 leading-tight drop-shadow-sm">
              {reading.title}
            </h1>
            <div className="text-sm text-slate-500 font-medium bg-slate-100 inline-block px-4 py-1 rounded-full">
              デッキ: {config.deckType === 'major' ? '大アルカナのみ' : 'フルデッキ'}
            </div>
          </div>

          <div className="flex justify-center gap-4 md:gap-8 flex-wrap mb-12">
            {drawnCards.map((card, idx) => (
              <div key={idx} className="flex flex-col items-center w-24 md:w-32">
                <span className="text-indigo-600 font-bold mb-2 text-[10px] md:text-xs border-b-2 border-indigo-200 pb-1 px-1 text-center w-full truncate">
                  {SPREAD_POSITIONS[config.spread][idx]}
                </span>
                <div className={`w-full aspect-[2/3] rounded-md overflow-hidden border-[3px] shadow-md bg-white ${card.isReversed ? 'rotate-180 border-purple-300' : 'border-indigo-200'}`}>
                   {card.img ? (
                      <img src={card.img} alt={card.name} className="w-full h-full object-cover" />
                    ) : (
                      <div className={`w-full h-full flex flex-col items-center justify-center text-white ${card.color} p-1 text-center`}>
                        <span className="text-[10px] font-bold opacity-80">{card.suit}</span>
                        <span className="text-2xl font-black mt-2">{card.rank}</span>
                      </div>
                    )}
                </div>
                <div className="mt-2 text-center bg-white px-2 py-1 rounded shadow-sm border border-slate-200 w-full">
                  <div className="font-bold text-slate-700 text-[10px] md:text-xs truncate">{card.name}</div>
                  <div className={`text-[9px] md:text-[10px] mt-0.5 font-bold ${card.isReversed ? 'text-purple-600' : 'text-emerald-600'}`}>
                    {card.isReversed ? '▼ 逆' : '▲ 正'}
                  </div>
                </div>
                {card.type === 'minor' && (
                  <a href={card.galleryLink} target="_blank" rel="noopener noreferrer" className="text-[10px] text-indigo-500 hover:text-indigo-700 font-bold underline mt-2 block transition-colors bg-indigo-50 px-2 py-1 rounded">
                    📖 小アルカナの意味と絵柄
                  </a>
                )}
              </div>
            ))}
          </div>

          <div className="space-y-6">
            <div className="bg-white rounded-2xl border border-slate-200 p-6 md:p-8 shadow-sm">
              <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-slate-100 pb-3">
                <span className="text-indigo-500">❖</span> カードのささやき
              </h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {reading.cardReadings.map((cr, idx) => (
                  <div key={idx} className="border-l-4 border-indigo-300 pl-4 bg-slate-50 p-4 rounded-r-lg">
                    <h4 className="font-bold text-indigo-800 mb-2 text-sm">{cr.position} : {cr.cardName}</h4>
                    <p className="text-slate-600 text-xs md:text-sm leading-relaxed">{cr.reading}</p>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white rounded-2xl border border-slate-200 p-6 md:p-8 shadow-sm">
              <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-3">
                <span className="text-purple-500">❖</span> 総合リーディング
              </h3>
              <p className="text-slate-700 leading-relaxed whitespace-pre-wrap">{reading.comprehensiveResult}</p>
            </div>

            <div className="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-2xl border border-indigo-200 p-6 md:p-8 shadow-md relative overflow-hidden">
              <h3 className="text-xl font-bold text-indigo-900 mb-4 flex items-center gap-2">
                <span className="text-yellow-500 text-2xl">✦</span> 導きとアクション
              </h3>
              <p className="text-indigo-900/90 leading-relaxed font-medium">{reading.adviceResult}</p>
            </div>
          </div>

          <div className="pt-8 flex flex-col md:flex-row gap-4 justify-center items-center pb-12">
            <button onClick={downloadTextFile} className="px-6 py-3 w-full md:w-auto bg-white hover:bg-slate-50 text-indigo-600 font-bold rounded-xl transition-all border-2 border-indigo-100 shadow-sm flex items-center justify-center gap-2">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              結果をテキストで保存
            </button>
            <button onClick={onReset} className="px-8 py-3 w-full md:w-auto bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-all shadow-md">
              新しく占う
            </button>
          </div>
        </div>
      );
    };

    // --- 履歴画面 ---
    const HistoryStage = ({ history, onBack }) => {
      return (
        <div className="max-w-4xl mx-auto py-8 animate-fade-in">
          <div className="flex justify-between items-center mb-8 border-b border-slate-200 pb-4">
            <h2 className="text-2xl font-bold text-indigo-600">鑑定履歴 (History)</h2>
            <button onClick={onBack} className="text-sm font-bold text-slate-500 hover:text-indigo-600 bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm transition-colors">◀ 戻る</button>
          </div>
          
          {history.length === 0 ? (
            <div className="text-center py-20 bg-white rounded-2xl border border-slate-100 shadow-sm">
              <p className="text-slate-400">履歴がありません。</p>
            </div>
          ) : (
            <div className="space-y-6">
              {history.map((item, idx) => (
                <div key={idx} className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                  <div className="flex justify-between items-start mb-4">
                    <h3 className="font-bold text-slate-800 text-lg">{item.reading.title}</h3>
                    <span className="text-xs font-medium text-slate-400 bg-slate-50 px-2 py-1 rounded">{item.date}</span>
                  </div>
                  <div className="text-sm text-slate-600 mb-4 line-clamp-2">{item.reading.comprehensiveResult}</div>
                  <div className="flex flex-wrap gap-2">
                    <span className="text-xs px-2 py-1 bg-indigo-600 text-white rounded font-bold">{item.spreadType}枚引き ({item.deckType === 'major' ? '大アルカナ' : 'フルデッキ'})</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // --- メインアプリケーション ---
    const App = () => {
      const [stage, setStage] = useState('auth');
      const [config, setConfig] = useState(null);
      const [drawnCards, setDrawnCards] = useState([]);
      const [reading, setReading] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');
      const [history, setHistory] = useState([]);

      useEffect(() => {
        const savedHistory = JSON.parse(localStorage.getItem('sync_tarot_history') || '[]');
        setHistory(savedHistory);
      }, [stage]);

      const saveToHistory = (newEntry) => {
        const currentHistory = JSON.parse(localStorage.getItem('sync_tarot_history') || '[]');
        const updatedHistory = [newEntry, ...currentHistory].slice(0, 30);
        localStorage.setItem('sync_tarot_history', JSON.stringify(updatedHistory));
      };
      
      const AuthStage = ({ onLogin }) => {
        const [passcode, setPasscode] = useState('');
        const handleSubmit = (e) => { e.preventDefault(); if (passcode === '1217') onLogin(); else setPasscode(''); };
        return (
          <div className="flex flex-col items-center justify-center min-h-[70vh]">
            <div className="bg-white p-8 rounded-2xl shadow-lg border border-slate-100 w-full max-w-md text-center">
              <h1 className="text-3xl font-bold tracking-widest text-indigo-600 mb-2">SYNCHRONICITY</h1>
              {/* 【追加】本格タロット占いのテキスト */}
              <p className="text-slate-500 font-bold mb-8">本格タロット占い - Oracle of Tarot</p>
              <form onSubmit={handleSubmit}>
                <input type="password" value={passcode} onChange={(e) => setPasscode(e.target.value)} placeholder="Passcode" className="w-full bg-slate-50 border border-slate-200 px-4 py-3 rounded-lg mb-4 text-center focus:outline-none focus:border-indigo-400" />
                <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg">ENTER</button>
              </form>
            </div>
          </div>
        );
      };

      const handleReset = () => { setConfig(null); setDrawnCards([]); setReading(null); setStage('input'); };

      return (
        <div className="min-h-screen relative p-4 md:p-8 pt-16">
          {/* 【追加】ポータルへ戻るボタン (全画面共通で左上に常時表示) */}
          <div className="absolute top-4 left-4 z-50">
            <a href="https://piaf-jp.github.io/synchronicity_Portal_20260613_001" className="text-xs font-bold text-slate-500 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm hover:text-indigo-600 hover:bg-indigo-50 transition-colors flex items-center gap-1">
              ◀ ポータルへ戻る
            </a>
          </div>

          {stage !== 'auth' && (
            <div className="absolute top-4 right-4 flex gap-3 z-50">
              {stage !== 'history' && (
                <button onClick={() => setStage('history')} className="text-xs font-bold text-indigo-600 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm hover:bg-indigo-50 transition-colors">
                  📓 History
                </button>
              )}
              <button onClick={() => { localStorage.removeItem('sync_tarot_api_key'); window.location.reload(); }} className="text-xs font-bold text-slate-500 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm hover:text-red-500 hover:bg-red-50 transition-colors">
                Logout
              </button>
            </div>
          )}

          {stage === 'auth' && <AuthStage onLogin={() => setStage('input')} />}
          {stage === 'input' && <InputStage onStart={(cfg) => { setConfig(cfg); setStage('shuffle'); }} />}
          {stage === 'shuffle' && <ShuffleStage spread={config.spread} deckType={config.deckType} onComplete={(cards) => { setDrawnCards(cards); setStage('loading'); }} />}
          {stage === 'loading' && <LoadingStage config={config} drawnCards={drawnCards} onResult={(res) => { setReading(res); setStage('result'); }} onError={(err) => { setErrorMsg(err); setStage('input'); alert(err); }} />}
          {stage === 'result' && <ResultStage reading={reading} drawnCards={drawnCards} config={config} onReset={handleReset} saveToHistory={saveToHistory} />}
          {stage === 'history' && <HistoryStage history={history} onBack={() => setStage(reading ? 'result' : 'input')} />}
          
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
          `}} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
